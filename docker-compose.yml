services:
  postgres:
    image: postgres:16-alpine
    container_name: pronostidamus-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: pronostidamus
      POSTGRES_USER: pronostidamus_user
      POSTGRES_PASSWORD: pronostidamus_password
      TZ: America/La_Paz
      PGTZ: America/La_Paz
    ports:
      - '5439:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: pronostidamus-backend-local
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3001
      TZ: America/La_Paz
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: pronostidamus_user
      DB_PASSWORD: pronostidamus_password
      DB_NAME: pronostidamus
      DB_SYNCHRONIZE: 'true'
      DB_LOGGING: 'false'
    ports:
      - '3001:3001'
    command: yarn start:dev
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres-data:
