services:
  postgres:
    image: postgres:16-alpine
    container_name: pronostidamus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pronostidamus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/La_Paz
      PGTZ: America/La_Paz
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: pronostidamus-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3000
      TZ: America/La_Paz
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: pronostidamus
      DB_SYNCHRONIZE: 'true'
      DB_LOGGING: 'false'
    ports:
      - '3000:3000'
    command: yarn start:dev
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres-data:
